<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dimple's JavaScript Playground ✨</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<body>
  <div class="header">
    <h1>JavaScript Playground</h1>
    <p>Learn by doing — clean & modern</p>
  </div>

  <div class="menu-bar">
    <a href="#" onclick="showSection('home')">Home</a>
    <a href="#" onclick="showSection('outputDemo')">Output Demo</a>
    <a href="#" onclick="showSection('variablesDemo')">Variables</a>
    <a href="#" onclick="showSection('buttonDemo')">Button Alert</a>
  </div>

  <main>
    <section class="content" id="home">
      <p>Welcome to your modern JavaScript playground ✨</p>
    </section>

    <!-- Output Demo -->
    <section class="content" id="outputDemo" style="display:none;">
      <h2>Output Demo</h2>
      <div id="output1"></div>
    </section>

    <!-- Variables Demo -->
    <section class="content" id="variablesDemo" style="display:none;">
      <h2>Variables Demo</h2>
      <div id="output2"></div>
    </section>

    <!-- Button Demo -->
    <section class="content" id="buttonDemo" style="display:none;">
      <h2>Button Demo</h2>
      <button id="btnClick">Click Me</button>
    </section>
  </main>

  <div class="footer">
    <p>&copy; 2026 Dimple's Playground</p>
  </div>
</body>
</html>
